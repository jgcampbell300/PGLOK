name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Create release package
      run: |
        mkdir -p release
        cp -r src release/
        cp -r scripts release/
        cp requirements.txt release/
        cp README.md release/
        cp LICENSE release/
        cp install_linux.sh release/
        cp start_linux.sh release/
        cp build_linux.sh release/
        tar -czf PGLOK-Linux-Source.tar.gz -C release .
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: PGLOK ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./PGLOK-Linux-Source.tar.gz
        asset_name: PGLOK-Linux-Source.tar.gz
        asset_content_type: application/gzip
