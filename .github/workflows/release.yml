name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Determine release version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux executable
        run: python -m PyInstaller --clean --noconfirm scripts/pyinstaller/pglok.spec

      - name: Package Linux release
        run: bash package_linux.sh

      - name: Upload Linux release asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            dist/PGLOK-Linux-v${{ steps.version.outputs.version }}.tar.gz
            dist/PGLOK-v${{ steps.version.outputs.version }}-source.tar.gz

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Determine release version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows executable
        run: python -m PyInstaller --clean --noconfirm scripts/pyinstaller/pglok.spec

      - name: Package Windows release (ZIP)
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="PGLOK-Windows-v${VERSION}.zip"
          mkdir -p "PGLOK-Windows-v${VERSION}"
          cp dist/PGLOK.exe "PGLOK-Windows-v${VERSION}/"
          cp icon.ico "PGLOK-Windows-v${VERSION}/"
          cp icon.png "PGLOK-Windows-v${VERSION}/"
          cp README.md "PGLOK-Windows-v${VERSION}/"
          cp LICENSE "PGLOK-Windows-v${VERSION}/"
          cp install_windows.bat "PGLOK-Windows-v${VERSION}/"
          7z a "dist/${ZIP_NAME}" "PGLOK-Windows-v${VERSION}/"
          rm -rf "PGLOK-Windows-v${VERSION}"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: dist/PGLOK-Windows-v${{ steps.version.outputs.version }}.zip

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          path: _assets

      - name: List downloaded assets
        run: ls -laR _assets/

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            _assets/linux-assets/*.tar.gz \
            _assets/linux-assets/*source*.tar.gz \
            _assets/windows-assets/*.zip \
            --title "PGLOK ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --draft=false \
            --prerelease=false
